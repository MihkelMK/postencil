version: "2"
linters:
  enable:
    - bodyclose
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - noctx
    - unparam
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - noctx
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/MihkelMK/postencil
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
